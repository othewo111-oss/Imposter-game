<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الغريب - Imposter</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --card: #21262d;
  --border: #30363d;
  --accent: #58a6ff;
  --accent2: #f78166;
  --green: #3fb950;
  --yellow: #d29922;
  --purple: #bc8cff;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --imposter: #f85149;
  --imposter-glow: rgba(248,81,73,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.screen { display:none; min-height:100vh; position:relative; z-index:1; }
.screen.active { display:flex; flex-direction:column; }

/* ===== WELCOME ===== */
#welcome {
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
}

.hero {
  text-align: center;
  margin-bottom: 2.5rem;
  animation: slideDown 0.6s ease;
}

.hero-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
  display: block;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.hero-title {
  font-family: 'Amiri', serif;
  font-size: clamp(2.5rem,8vw,4rem);
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}

.hero-sub {
  font-size: 0.85rem;
  color: var(--text-dim);
  letter-spacing: 0.3em;
  margin-top: 0.5rem;
  text-transform: uppercase;
}

.hero-desc {
  font-size: 0.9rem;
  color: var(--text-dim);
  margin-top: 1rem;
  line-height: 1.7;
  max-width: 340px;
  margin-left: auto;
  margin-right: auto;
}

.main-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  width: 100%;
  max-width: 460px;
  animation: slideUp 0.6s 0.1s both ease;
  box-shadow: 0 0 40px rgba(88,166,255,0.05);
}

.field-label {
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.field-label::before { content:''; flex:1; height:1px; background:var(--border); }

/* Player count */
.count-grid {
  display: grid;
  grid-template-columns: repeat(6,1fr);
  gap: 0.4rem;
  margin-bottom: 1.5rem;
}

.cnt-btn {
  aspect-ratio: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  font-family: 'Tajawal', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.cnt-btn:hover { border-color: var(--accent); color: var(--accent); }
.cnt-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

/* Player names */
.names-grid { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1.5rem; }

.name-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.5rem 0.75rem;
  transition: border-color 0.15s;
}
.name-row:focus-within { border-color: var(--accent); }

.name-idx {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text-dim);
  font-size: 0.7rem;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.name-row input {
  flex:1;
  background:none;
  border:none;
  outline:none;
  color:var(--text);
  font-family:'Tajawal',sans-serif;
  font-size:0.9rem;
  direction:rtl;
}
.name-row input::placeholder { color:var(--text-dim); }

/* Categories */
.categories-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 0.4rem;
  margin-bottom: 1rem;
}

.cat-btn {
  padding: 0.6rem 0.5rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  font-family: 'Tajawal', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.cat-btn:hover { border-color: var(--accent); color: var(--text); }
.cat-btn.active { border-color: var(--accent); background: rgba(88,166,255,0.1); color: var(--accent); }

.custom-word-row {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
}

.custom-input {
  flex:1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.6rem 0.75rem;
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  font-size: 0.9rem;
  outline:none;
  direction:rtl;
  transition: border-color 0.15s;
}
.custom-input:focus { border-color: var(--accent); }
.custom-input::placeholder { color: var(--text-dim); }

/* Timer */
.timer-row {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 1.5rem;
}

.timer-btn {
  flex:1;
  padding: 0.5rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  font-family: 'Tajawal', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.15s;
  text-align:center;
}
.timer-btn:hover { border-color: var(--yellow); color: var(--yellow); }
.timer-btn.active { border-color: var(--yellow); background: rgba(210,153,34,0.1); color: var(--yellow); }

.btn-start {
  width:100%;
  padding: 1rem;
  background: linear-gradient(135deg, var(--accent), #1a6eff);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'Tajawal', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
.btn-start:hover { transform:translateY(-2px); box-shadow: 0 8px 25px rgba(88,166,255,0.3); }

/* ===== REVEAL SCREEN ===== */
#reveal {
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
}

.reveal-wrap {
  width:100%;
  max-width:380px;
  text-align:center;
}

.reveal-header { margin-bottom: 1.5rem; }
.reveal-header h2 { font-family:'Amiri',serif; font-size:1.5rem; color:var(--accent); }
.reveal-header p { font-size:0.82rem; color:var(--text-dim); margin-top:0.3rem; }

.word-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 20px;
  min-height: 240px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s;
  margin-bottom: 1.5rem;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.word-card:hover { transform: scale(1.01); }
.word-card.imposter-card { border-color: var(--imposter); box-shadow: 0 10px 40px var(--imposter-glow); }
.word-card.normal-card { border-color: var(--green); box-shadow: 0 10px 40px rgba(63,185,80,0.2); }

.card-back {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0.75rem;
  background: var(--card);
  transition: opacity 0.4s;
}

.card-front {
  opacity:0;
  transition: opacity 0.4s;
  text-align:center;
  padding: 2rem;
}

.word-card.flipped .card-back { opacity:0; pointer-events:none; }
.word-card.flipped .card-front { opacity:1; }

.lock-emoji { font-size:2.5rem; }
.card-player { font-size:1.1rem; color:var(--accent); font-weight:600; }
.tap-hint { font-size:0.75rem; color:var(--text-dim); }

.word-emoji { font-size:3.5rem; margin-bottom:0.5rem; }
.word-role { font-size:0.75rem; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:0.3rem; }
.word-role.imposter { color:var(--imposter); }
.word-role.normal { color:var(--green); }
.the-word { font-family:'Amiri',serif; font-size:2.5rem; font-weight:700; margin-bottom:0.5rem; }
.the-word.imposter-word { color:var(--imposter); text-shadow:0 0 20px var(--imposter-glow); }
.the-word.normal-word { color:var(--green); }
.word-hint { font-size:0.8rem; color:var(--text-dim); line-height:1.5; max-width:240px; margin:0 auto; }
.category-tag {
  display:inline-block;
  padding:0.2rem 0.6rem;
  background:rgba(88,166,255,0.1);
  border:1px solid rgba(88,166,255,0.3);
  border-radius:20px;
  font-size:0.7rem;
  color:var(--accent);
  margin-bottom:0.5rem;
}

.reveal-progress { font-size:0.75rem; color:var(--text-dim); margin-bottom:1rem; }

.btn-next {
  padding: 0.8rem 2rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  font-size: 0.9rem;
  font-weight:600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-next:hover { border-color:var(--accent); color:var(--accent); }

/* ===== GAME SCREEN ===== */
#game {
  flex-direction: column;
}

.game-top {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top:0;
  z-index:50;
}

.game-logo { font-family:'Amiri',serif; font-size:1.2rem; color:var(--accent); }
.round-badge {
  padding:0.25rem 0.75rem;
  background: rgba(88,166,255,0.1);
  border:1px solid rgba(88,166,255,0.3);
  border-radius:20px;
  font-size:0.75rem;
  color:var(--accent);
}

.game-body { flex:1; padding:1.25rem; overflow-y:auto; }

/* Timer display */
.timer-display {
  text-align:center;
  margin-bottom:1.5rem;
  position:relative;
}

.timer-circle {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: var(--card);
  border: 3px solid var(--border);
  display: flex;
  flex-direction:column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 0.75rem;
  position:relative;
  transition: border-color 0.3s;
}

.timer-circle.warning { border-color: var(--yellow); box-shadow: 0 0 20px rgba(210,153,34,0.2); }
.timer-circle.danger { border-color: var(--imposter); box-shadow: 0 0 20px var(--imposter-glow); animation: pulse 0.5s infinite; }

.timer-num {
  font-size:2rem;
  font-weight:800;
  line-height:1;
}
.timer-label { font-size:0.65rem; color:var(--text-dim); letter-spacing:0.1em; }

.timer-controls { display:flex; gap:0.5rem; justify-content:center; }

.t-btn {
  padding:0.4rem 1rem;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text-dim);
  font-family:'Tajawal',sans-serif;
  font-size:0.8rem;
  cursor:pointer;
  transition:all 0.15s;
}
.t-btn:hover { border-color:var(--accent); color:var(--accent); }
.t-btn.active-timer { border-color:var(--yellow); color:var(--yellow); background:rgba(210,153,34,0.1); }

/* Category & word display */
.info-banner {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem;
  margin-bottom: 1rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.info-cat { font-size:0.75rem; color:var(--text-dim); }
.info-cat span { color:var(--accent); font-weight:600; }
.info-players { font-size:0.75rem; color:var(--text-dim); }
.info-players span { color:var(--green); font-weight:600; }

/* Players list in game */
.game-players { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1.5rem; }

.gplayer-row {
  display:flex;
  align-items:center;
  gap:0.75rem;
  padding:0.65rem 0.9rem;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  cursor:pointer;
  transition:all 0.15s;
  position:relative;
}

.gplayer-row:hover { border-color:var(--imposter); }
.gplayer-row.eliminated { opacity:0.4; }
.gplayer-row.eliminated::after {
  content:'مُصوَّت عليه';
  position:absolute;
  left:0.75rem;
  font-size:0.65rem;
  color:var(--imposter);
  letter-spacing:0.05em;
}

.gp-avatar {
  width:36px;
  height:36px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0.9rem;
  font-weight:700;
  flex-shrink:0;
  background:var(--border);
  color:var(--text-dim);
}

.gp-name { flex:1; font-size:0.9rem; font-weight:500; }
.gp-votes {
  font-size:0.75rem;
  color:var(--text-dim);
  display:flex;
  align-items:center;
  gap:0.25rem;
}

.vote-dot {
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--imposter);
}

.section-title {
  font-size:0.72rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--text-dim);
  margin-bottom:0.75rem;
  display:flex;
  align-items:center;
  gap:0.5rem;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* Vote buttons */
.vote-section { margin-bottom:1.5rem; }

.vote-player-row {
  display:flex;
  align-items:center;
  gap:0.75rem;
  padding:0.6rem 0.9rem;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:0.4rem;
}

.vote-btns { display:flex; gap:0.4rem; margin-right:auto; }

.v-btn {
  padding:0.3rem 0.7rem;
  border:1px solid var(--border);
  border-radius:6px;
  background:var(--surface);
  color:var(--text-dim);
  font-family:'Tajawal',sans-serif;
  font-size:0.75rem;
  cursor:pointer;
  transition:all 0.15s;
}
.v-btn.voted-suspect { background:rgba(248,81,73,0.15); border-color:var(--imposter); color:var(--imposter); }
.v-btn.voted-clear { background:rgba(63,185,80,0.15); border-color:var(--green); color:var(--green); }

/* Action buttons */
.action-row { display:flex; gap:0.5rem; margin-bottom:1rem; }

.btn-action {
  flex:1;
  padding:0.75rem;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  font-family:'Tajawal',sans-serif;
  font-size:0.85rem;
  font-weight:600;
  cursor:pointer;
  transition:all 0.15s;
}

.btn-action.danger { border-color:var(--imposter); color:var(--imposter); }
.btn-action.danger:hover { background:rgba(248,81,73,0.1); }
.btn-action.success { border-color:var(--green); color:var(--green); }
.btn-action.success:hover { background:rgba(63,185,80,0.1); }
.btn-action.primary { border-color:var(--accent); color:var(--accent); }
.btn-action.primary:hover { background:rgba(88,166,255,0.1); }

/* ===== RESULT SCREEN ===== */
#result {
  align-items:center;
  justify-content:center;
  padding:2rem 1.5rem;
  text-align:center;
}

.result-icon { font-size:5rem; margin-bottom:1rem; animation:bounceIn 0.5s ease; }
.result-title { font-family:'Amiri',serif; font-size:2.5rem; margin-bottom:0.5rem; }
.result-title.imposter-wins { color:var(--imposter); }
.result-title.players-win { color:var(--green); }
.result-sub { font-size:0.9rem; color:var(--text-dim); margin-bottom:2rem; line-height:1.6; }

.reveal-box {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:1.5rem;
  width:100%;
  max-width:380px;
  margin-bottom:1.5rem;
}

.reveal-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0.6rem 0;
  border-bottom:1px solid var(--border);
  font-size:0.85rem;
}
.reveal-item:last-child { border-bottom:none; }
.reveal-item .ri-label { color:var(--text-dim); }
.reveal-item .ri-val { font-weight:700; }
.ri-val.red { color:var(--imposter); }
.ri-val.green { color:var(--green); }
.ri-val.blue { color:var(--accent); }

/* Modal */
.modal-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:200;
  padding:1.5rem;
  backdrop-filter:blur(4px);
  animation:fadeIn 0.2s ease;
}
.modal-overlay.hidden { display:none; }

.modal-box {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:2rem;
  width:100%;
  max-width:360px;
  text-align:center;
  animation:scaleIn 0.2s ease;
}

.modal-icon { font-size:3rem; margin-bottom:0.75rem; }
.modal-title { font-family:'Amiri',serif; font-size:1.8rem; margin-bottom:0.5rem; }
.modal-body { font-size:0.85rem; color:var(--text-dim); line-height:1.6; margin-bottom:1.5rem; }

/* Animations */
@keyframes slideDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes scaleIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
@keyframes bounceIn { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <div style="width:100%;max-width:460px;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1.5rem;">
    <div class="hero">
      <span class="hero-icon">🕵️</span>
      <div class="hero-title">الغريب</div>
      <div class="hero-sub">Imposter Word Game</div>
      <div class="hero-desc">كل لاعب يحصل على نفس الكلمة إلا <strong style="color:var(--imposter)">الغريب</strong> — اكتشفوه قبل أن يختبئ!</div>
    </div>

    <div class="main-card">
      <div class="field-label">عدد اللاعبين</div>
      <div class="count-grid" id="count-grid">
        <button class="cnt-btn" onclick="setCount(3)">3</button>
        <button class="cnt-btn" onclick="setCount(4)">4</button>
        <button class="cnt-btn" onclick="setCount(5)">5</button>
        <button class="cnt-btn" onclick="setCount(6)">6</button>
        <button class="cnt-btn" onclick="setCount(7)">7</button>
        <button class="cnt-btn" onclick="setCount(8)">8</button>
      </div>

      <div class="field-label">أسماء اللاعبين</div>
      <div class="names-grid" id="names-grid"></div>

      <div class="field-label">الفئة</div>
      <div class="categories-grid" id="cats-grid">
        <button class="cat-btn active" onclick="setCat('random')" data-cat="random">🎲 عشوائي</button>
        <button class="cat-btn" onclick="setCat('animals')" data-cat="animals">🐾 حيوانات</button>
        <button class="cat-btn" onclick="setCat('food')" data-cat="food">🍕 طعام</button>
        <button class="cat-btn" onclick="setCat('sports')" data-cat="sports">⚽ رياضة</button>
        <button class="cat-btn" onclick="setCat('places')" data-cat="places">🏙️ أماكن</button>
        <button class="cat-btn" onclick="setCat('jobs')" data-cat="jobs">👷 مهن</button>
        <button class="cat-btn" onclick="setCat('movies')" data-cat="movies">🎬 أفلام</button>
        <button class="cat-btn" onclick="setCat('custom')" data-cat="custom">✏️ مخصص</button>
      </div>

      <div class="custom-word-row" id="custom-row" style="display:none">
        <input type="text" class="custom-input" id="custom-input" placeholder="اكتب كلمتك المخصصة..." maxlength="20">
      </div>

      <div class="field-label">وقت النقاش</div>
      <div class="timer-row">
        <button class="timer-btn active" onclick="setTimer(0)" data-t="0">بدون</button>
        <button class="timer-btn" onclick="setTimer(60)" data-t="60">١ د</button>
        <button class="timer-btn" onclick="setTimer(120)" data-t="120">٢ د</button>
        <button class="timer-btn" onclick="setTimer(180)" data-t="180">٣ د</button>
        <button class="timer-btn" onclick="setTimer(300)" data-t="300">٥ د</button>
      </div>

      <button class="btn-start" onclick="startGame()">🕵️ ابدأ اللعبة</button>
    </div>
  </div>
</div>

<!-- REVEAL -->
<div id="reveal" class="screen">
  <div class="reveal-wrap">
    <div class="reveal-header">
      <h2>توزيع الكلمات 🔐</h2>
      <p>مرر الجهاز لكل لاعب ليرى كلمته بسرية</p>
    </div>

    <div class="word-card" id="word-card" onclick="flipCard()">
      <div class="card-back">
        <div class="lock-emoji">🔒</div>
        <div class="card-player" id="reveal-name">-</div>
        <div class="tap-hint">اضغط لرؤية كلمتك</div>
      </div>
      <div class="card-front" id="card-front-content"></div>
    </div>

    <div class="reveal-progress" id="reveal-progress"></div>
    <button class="btn-next" id="btn-next-reveal" onclick="nextReveal()">التالي →</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="game-top">
    <div class="game-logo">🕵️ الغريب</div>
    <div class="round-badge" id="round-badge">الجولة 1</div>
  </div>

  <div class="game-body">
    <!-- Timer -->
    <div class="timer-display" id="timer-section" style="display:none">
      <div class="timer-circle" id="timer-circle">
        <div class="timer-num" id="timer-num">00</div>
        <div class="timer-label">ثانية</div>
      </div>
      <div class="timer-controls">
        <button class="t-btn" id="timer-start-btn" onclick="toggleTimer()">▶ ابدأ</button>
        <button class="t-btn" onclick="resetTimer()">↺ إعادة</button>
      </div>
    </div>

    <div class="info-banner">
      <div class="info-cat">الفئة: <span id="game-cat">-</span></div>
      <div class="info-players">اللاعبون: <span id="game-players-count">-</span></div>
    </div>

    <div class="section-title">التصويت على الغريب</div>
    <div class="vote-section" id="vote-section"></div>

    <div class="action-row">
      <button class="btn-action danger" onclick="showEliminateModal()">🗳️ كشف الغريب</button>
      <button class="btn-action primary" onclick="showHintModal()">💡 تلميح</button>
    </div>
    <div class="action-row">
      <button class="btn-action success" onclick="showWordModal()">👁️ الكلمة الصحيحة</button>
      <button class="btn-action" onclick="restartGame()">🔄 جولة جديدة</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div id="result-icon" class="result-icon"></div>
  <div id="result-title" class="result-title"></div>
  <div id="result-sub" class="result-sub"></div>

  <div class="reveal-box" id="result-box"></div>

  <div style="display:flex;gap:0.75rem;width:100%;max-width:380px;">
    <button class="btn-action primary" style="padding:1rem" onclick="playAgain()">🔄 مرة أخرى</button>
    <button class="btn-action" style="padding:1rem" onclick="goHome()">🏠 الرئيسية</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal-box">
    <div class="modal-icon" id="m-icon"></div>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-body" id="m-body"></div>
    <div style="display:flex;gap:0.5rem;">
      <button class="btn-action" style="flex:1;padding:0.75rem" id="m-cancel" onclick="closeModal()">إلغاء</button>
      <button class="btn-action danger" style="flex:1;padding:0.75rem" id="m-confirm" onclick="confirmModal()">تأكيد</button>
    </div>
  </div>
</div>

<script>
// ===== WORD BANK =====
const WORDS = {
  animals: ['أسد','نمر','فيل','زرافة','قرد','دولفين','بطريق','كنغر','ذئب','ثعلب','حوت','تمساح','نسر','أرنب','دب','حصان','ضفدع','طاووس','غزال','خروف'],
  food: ['بيتزا','سوشي','برغر','شاورما','كباب','لازانيا','تاكو','فلافل','مندي','كنافة','بقلاوة','شاورما','مكرونة','ستيك','سلمون','تمر','مقلوبة','كبسة','منسف','كوشري'],
  sports: ['كرة القدم','كرة السلة','السباحة','التنس','الملاكمة','الجودو','ركوب الأمواج','الغوص','رفع الأثقال','الجمباز','الهوكي','البيسبول','الغولف','الدراجات','الكاراتيه','الرماية','الفروسية','الزلاجات','الاسكواش','الباراشوت'],
  places: ['باريس','طوكيو','دبي','القاهرة','لندن','نيويورك','روما','بانكوك','إسطنبول','برشلونة','سنغافورة','أمستردام','مراكش','كيب تاون','ريو','سيدني','موسكو','بكين','مكة','البندقية'],
  jobs: ['طبيب','مهندس','معلم','طيار','رائد فضاء','شيف','محامي','صحفي','فنان','موسيقار','مبرمج','بحار','رجل إطفاء','عالم','كاتب','ممثل','مدير','معماري','رياضي','مصور'],
  movies: ['أفاتار','تيتانيك','الأسد الملك','شريك','سبايدرمان','باتمان','فروزن','توي ستوري','ماتريكس','جوكر','أنتمان','كابتن أمريكا','الهوية البورنية','جيمس بوند','هاري بوتر','ستار وورز','إندي جونز','نجم الموت','الجوكر','لادي بيرد'],
};

// ===== STATE =====
let G = {
  playerCount: 5,
  players: [],
  selectedCat: 'random',
  timerDuration: 0,
  word: '',
  category: '',
  imposterIndex: -1,
  revealIdx: 0,
  revealed: false,
  votes: {},
  timerInterval: null,
  timerLeft: 0,
  timerRunning: false,
  round: 1,
  modalCallback: null,
};

// ===== WELCOME =====
function setCount(n) {
  G.playerCount = n;
  document.querySelectorAll('.cnt-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.cnt-btn')[n-3].classList.add('active');
  buildNames(n);
}

function buildNames(n) {
  const g = document.getElementById('names-grid');
  g.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const row = document.createElement('div');
    row.className = 'name-row';
    row.innerHTML = `<div class="name-idx">${i+1}</div><input type="text" placeholder="اسم اللاعب ${i+1}" id="n${i}">`;
    g.appendChild(row);
  }
}

function setCat(cat) {
  G.selectedCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-cat="${cat}"]`).classList.add('active');
  document.getElementById('custom-row').style.display = cat === 'custom' ? 'flex' : 'none';
}

function setTimer(t) {
  G.timerDuration = t;
  document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-t="${t}"]`).classList.add('active');
}

function getWord() {
  if (G.selectedCat === 'custom') {
    const v = document.getElementById('custom-input').value.trim();
    return { word: v || 'كلمة مخصصة', cat: 'مخصص' };
  }
  if (G.selectedCat === 'random') {
    const cats = Object.keys(WORDS);
    const cat = cats[Math.floor(Math.random() * cats.length)];
    const words = WORDS[cat];
    return { word: words[Math.floor(Math.random() * words.length)], cat: catName(cat) };
  }
  const words = WORDS[G.selectedCat];
  return { word: words[Math.floor(Math.random() * words.length)], cat: catName(G.selectedCat) };
}

function catName(key) {
  const map = { animals:'حيوانات', food:'طعام', sports:'رياضة', places:'أماكن', jobs:'مهن', movies:'أفلام' };
  return map[key] || key;
}

function startGame() {
  const names = [];
  for (let i = 0; i < G.playerCount; i++) {
    const v = document.getElementById(`n${i}`)?.value.trim() || `لاعب ${i+1}`;
    names.push(v);
  }
  G.players = names;

  const { word, cat } = getWord();
  G.word = word;
  G.category = cat;
  G.imposterIndex = Math.floor(Math.random() * G.playerCount);
  G.revealIdx = 0;
  G.revealed = false;
  G.votes = {};

  showScreen('reveal');
  showReveal();
}

// ===== REVEAL =====
function showReveal() {
  const i = G.revealIdx;
  const card = document.getElementById('word-card');
  card.classList.remove('flipped','imposter-card','normal-card');
  G.revealed = false;

  document.getElementById('reveal-name').textContent = G.players[i];
  document.getElementById('reveal-progress').textContent = `${i+1} / ${G.players.length}`;

  const nextBtn = document.getElementById('btn-next-reveal');
  nextBtn.textContent = i < G.players.length - 1 ? 'التالي →' : '🕵️ ابدأ النقاش';
}

function flipCard() {
  if (G.revealed) return;
  G.revealed = true;

  const i = G.revealIdx;
  const isImposter = i === G.imposterIndex;
  const card = document.getElementById('word-card');

  card.classList.add('flipped');
  card.classList.add(isImposter ? 'imposter-card' : 'normal-card');

  const catEmojis = { حيوانات:'🐾', طعام:'🍕', رياضة:'⚽', أماكن:'🏙️', مهن:'👷', أفلام:'🎬', مخصص:'✏️' };
  const emoji = catEmojis[G.category] || '🎯';

  let html = '';
  if (isImposter) {
    html = `
      <div class="category-tag">${G.category}</div>
      <div class="word-emoji">🕵️</div>
      <div class="word-role imposter">أنت الغريب!</div>
      <div class="the-word imposter-word">؟؟؟</div>
      <div class="word-hint">أنت لا تعرف الكلمة! حاول الاختباء والتظاهر بأنك تعرفها من ردود فعل الآخرين.</div>
    `;
  } else {
    html = `
      <div class="category-tag">${G.category}</div>
      <div class="word-emoji">${emoji}</div>
      <div class="word-role normal">الكلمة السرية</div>
      <div class="the-word normal-word">${G.word}</div>
      <div class="word-hint">تحدث عن الكلمة بطريقة تثبت أنك تعرفها دون أن تقولها مباشرة.</div>
    `;
  }

  document.getElementById('card-front-content').innerHTML = html;
}

function nextReveal() {
  if (!G.revealed) {
    showModal('⚠️', 'انتبه!', 'اضغط على البطاقة أولاً لترى كلمتك.', null, false);
    return;
  }

  G.revealIdx++;
  if (G.revealIdx >= G.players.length) {
    startGameScreen();
  } else {
    G.revealed = false;
    showReveal();
  }
}

// ===== GAME SCREEN =====
function startGameScreen() {
  showScreen('game');

  document.getElementById('round-badge').textContent = `الجولة ${G.round}`;
  document.getElementById('game-cat').textContent = G.category;
  document.getElementById('game-players-count').textContent = G.players.length;

  // Timer
  const ts = document.getElementById('timer-section');
  if (G.timerDuration > 0) {
    ts.style.display = 'block';
    G.timerLeft = G.timerDuration;
    G.timerRunning = false;
    updateTimerDisplay();
  } else {
    ts.style.display = 'none';
  }

  renderVoteSection();
}

function renderVoteSection() {
  const vs = document.getElementById('vote-section');
  vs.innerHTML = '';
  G.players.forEach((name, i) => {
    const v = G.votes[i] || null;
    const div = document.createElement('div');
    div.className = 'vote-player-row';
    div.innerHTML = `
      <div class="gp-avatar" style="background:${avatarColor(i)};color:#fff">${name[0]}</div>
      <div style="flex:1;font-size:0.88rem;">${name}</div>
      <div class="vote-btns">
        <button class="v-btn ${v==='suspect'?'voted-suspect':''}" onclick="castVote(${i},'suspect')">🔴 مشبوه</button>
        <button class="v-btn ${v==='clear'?'voted-clear':''}" onclick="castVote(${i},'clear')">✅ بريء</button>
      </div>
    `;
    vs.appendChild(div);
  });
}

function castVote(idx, type) {
  G.votes[idx] = G.votes[idx] === type ? null : type;
  renderVoteSection();
}

function avatarColor(i) {
  const colors = ['#58a6ff','#3fb950','#f78166','#bc8cff','#d29922','#39d353','#ff7b72','#79c0ff'];
  return colors[i % colors.length];
}

// Timer
function toggleTimer() {
  if (G.timerRunning) {
    clearInterval(G.timerInterval);
    G.timerRunning = false;
    document.getElementById('timer-start-btn').textContent = '▶ استأنف';
    document.getElementById('timer-start-btn').classList.remove('active-timer');
  } else {
    if (G.timerLeft <= 0) { G.timerLeft = G.timerDuration; }
    G.timerRunning = true;
    document.getElementById('timer-start-btn').textContent = '⏸ إيقاف';
    document.getElementById('timer-start-btn').classList.add('active-timer');
    G.timerInterval = setInterval(() => {
      G.timerLeft--;
      updateTimerDisplay();
      if (G.timerLeft <= 0) {
        clearInterval(G.timerInterval);
        G.timerRunning = false;
        document.getElementById('timer-start-btn').textContent = '▶ ابدأ';
        document.getElementById('timer-start-btn').classList.remove('active-timer');
        showModal('⏰', 'انتهى الوقت!', 'حان وقت التصويت على الغريب!', null, false);
      }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(G.timerInterval);
  G.timerRunning = false;
  G.timerLeft = G.timerDuration;
  document.getElementById('timer-start-btn').textContent = '▶ ابدأ';
  document.getElementById('timer-start-btn').classList.remove('active-timer');
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-num');
  const circle = document.getElementById('timer-circle');
  const mins = Math.floor(G.timerLeft / 60);
  const secs = G.timerLeft % 60;
  el.textContent = mins > 0
    ? `${mins}:${String(secs).padStart(2,'0')}`
    : String(G.timerLeft).padStart(2,'0');

  const ratio = G.timerLeft / G.timerDuration;
  circle.classList.remove('warning','danger');
  if (ratio <= 0.2) circle.classList.add('danger');
  else if (ratio <= 0.4) circle.classList.add('warning');
}

// Actions
function showEliminateModal() {
  const suspects = G.players.filter((_, i) => G.votes[i] === 'suspect');
  if (suspects.length === 0) {
    showModal('🤔', 'لم تصوّت بعد!', 'صوّت على المشتبه بهم أولاً من القائمة أعلاه.', null, false);
    return;
  }
  const topSuspect = suspects[0];
  showModal('🗳️', 'كشف الغريب؟', `هل تريد الكشف عن الغريب؟ الأكثر اشتباهاً: ${suspects.join('، ')}`, () => {
    const actualImposter = G.players[G.imposterIndex];
    showResultScreen(suspects.includes(actualImposter));
  }, true);
}

function showHintModal() {
  const hints = [
    `الفئة هي: ${G.category}`,
    `عدد حروف الكلمة: ${G.word.length}`,
    `الكلمة تبدأ بـ: ${G.word[0]}`,
  ];
  const hint = hints[Math.floor(Math.random() * hints.length)];
  showModal('💡', 'تلميح', hint, null, false);
}

function showWordModal() {
  showModal('👁️', 'الكلمة الصحيحة', `الكلمة كانت: "${G.word}"\nالغريب كان: ${G.players[G.imposterIndex]}`, null, false);
}

// ===== RESULT =====
function showResultScreen(playersWon) {
  clearInterval(G.timerInterval);
  showScreen('result');

  const imposterName = G.players[G.imposterIndex];

  if (playersWon) {
    document.getElementById('result-icon').textContent = '🎉';
    document.getElementById('result-title').textContent = 'فاز اللاعبون!';
    document.getElementById('result-title').className = 'result-title players-win';
    document.getElementById('result-sub').textContent = `أحسنتم! اكتشفتم الغريب وكشفتم مخططه.`;
  } else {
    document.getElementById('result-icon').textContent = '🕵️';
    document.getElementById('result-title').textContent = 'فاز الغريب!';
    document.getElementById('result-title').className = 'result-title imposter-wins';
    document.getElementById('result-sub').textContent = `نجح الغريب في الاختباء بينكم! كان هو ${imposterName}.`;
  }

  const suspectList = G.players.filter((_, i) => G.votes[i] === 'suspect').join('، ') || 'لا أحد';

  document.getElementById('result-box').innerHTML = `
    <div class="reveal-item"><span class="ri-label">🕵️ الغريب كان</span><span class="ri-val red">${imposterName}</span></div>
    <div class="reveal-item"><span class="ri-label">🔑 الكلمة السرية</span><span class="ri-val blue">${G.word}</span></div>
    <div class="reveal-item"><span class="ri-label">📂 الفئة</span><span class="ri-val blue">${G.category}</span></div>
    <div class="reveal-item"><span class="ri-label">🔴 المشتبه بهم</span><span class="ri-val">${suspectList}</span></div>
    <div class="reveal-item"><span class="ri-label">🏆 النتيجة</span><span class="ri-val ${playersWon?'green':'red'}">${playersWon?'اللاعبون':'الغريب'}</span></div>
  `;
}

function playAgain() {
  G.round++;
  const { word, cat } = getWord();
  G.word = word;
  G.category = cat;
  G.imposterIndex = Math.floor(Math.random() * G.playerCount);
  G.revealIdx = 0;
  G.revealed = false;
  G.votes = {};
  clearInterval(G.timerInterval);
  G.timerRunning = false;
  showScreen('reveal');
  showReveal();
}

function restartGame() {
  G.round++;
  const { word, cat } = getWord();
  G.word = word;
  G.category = cat;
  G.imposterIndex = Math.floor(Math.random() * G.playerCount);
  G.revealIdx = 0;
  G.revealed = false;
  G.votes = {};
  clearInterval(G.timerInterval);
  G.timerRunning = false;
  showScreen('reveal');
  showReveal();
}

function goHome() {
  clearInterval(G.timerInterval);
  showScreen('welcome');
}

// ===== MODAL =====
function showModal(icon, title, body, callback, showConfirm) {
  document.getElementById('m-icon').textContent = icon;
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-body').textContent = body;
  G.modalCallback = callback;
  const confirmBtn = document.getElementById('m-confirm');
  const cancelBtn = document.getElementById('m-cancel');
  if (showConfirm) {
    confirmBtn.style.display = 'block';
    cancelBtn.textContent = 'إلغاء';
  } else {
    confirmBtn.style.display = 'none';
    cancelBtn.textContent = 'حسناً';
  }
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function confirmModal() {
  closeModal();
  if (G.modalCallback) { G.modalCallback(); G.modalCallback = null; }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Init
setCount(5);
setTimer(0);
</script>
</body>
</html>
